services:
  backend:
    build: ./backend
    ports:
      - "8000:8000"
    env_file:
      - ./.env.local.docker
    environment:
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3000}

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
    ports:
      - "3000:80"
    depends_on:
      - backend