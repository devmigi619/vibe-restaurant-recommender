services:
  backend:
    image: ghcr.io/devmigi619/vibe-restaurant-recommender-backend:latest  # ⚠️ GitHub 사용자명으로 변경
    container_name: vibe-backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      - CORS_ORIGINS=${CORS_ORIGINS:-http://168.107.4.25:3000}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    image: ghcr.io/devmigi619/vibe-restaurant-recommender-frontend:latest  # ⚠️ GitHub 사용자명으로 변경
    container_name: vibe-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped
